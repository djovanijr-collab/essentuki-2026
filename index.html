<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Маршрутный лист -2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #ffffff;
    --panel: #f6f5f2;
    --panel-2: #eeece7;
    --line: #e2e0da;
    --text: #1c1f26;
    --text-dim: #82807a;
    --amber: #e8631a;
    --amber-soft: #fdead9;
    --amber-line: #f0b686;
    --teal: #0d8f83;
    --teal-soft: #dcf3ef;
    --teal-line: #8ccec5;
    --red: #d64545;
    --radius: 12px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;}
  ::selection{background:var(--amber-soft);color:var(--amber);}

  .app{
    max-width:640px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }

  /* ---------- HEADER ---------- */
  header{
    padding:20px 20px 16px;
    border-bottom:1px solid var(--line);
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:.16em;
    color:var(--amber);
    text-transform:uppercase;
    font-weight:700;
  }
  h1{
    margin:2px 0 0;
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:clamp(13px, 5.1vw, 22px);
    letter-spacing:-.01em;
    line-height:1.2;
    white-space:nowrap;
  }
  .route-line{
    font-family:'JetBrains Mono', monospace;
    font-size:11.5px;
    color:var(--text-dim);
    line-height:1.5;
  }
  .route-line b{color:var(--text); font-weight:600;}

  .odometer{
    display:flex;
    align-items:center;
    gap:14px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:10px 16px;
  }
  .odo-digits{
    font-family:'JetBrains Mono', monospace;
    font-size:24px;
    font-weight:700;
    color:var(--amber);
    min-width:56px;
  }
  .odo-digits span{color:var(--text-dim); font-size:15px;}
  .odo-ticks{display:flex; gap:4px; flex:1; flex-wrap:wrap;}
  .odo-tick{
    width:14px; height:8px;
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:2px;
    transition:background .25s, border-color .25s;
  }
  .odo-tick.on{ background:var(--teal); border-color:var(--teal);}
  .odo-label{font-family:'JetBrains Mono', monospace; font-size:9.5px; color:var(--text-dim); letter-spacing:.08em; text-transform:uppercase;}

  /* ---------- VERTICAL TIMELINE ---------- */
  main{
    flex:1;
    padding:22px 20px 8px;
  }
  .tl-row{
    display:flex;
    gap:14px;
    position:relative;
  }
  .tl-axis{
    display:flex;
    flex-direction:column;
    align-items:center;
    width:36px;
    flex-shrink:0;
  }
  .tl-dot{
    width:36px; height:36px;
    border-radius:50%;
    background:#fff;
    border:2px solid var(--amber);
    color:var(--amber);
    display:flex; align-items:center; justify-content:center;
    font-family:'JetBrains Mono', monospace;
    font-weight:700; font-size:13px;
    flex-shrink:0;
    z-index:1;
    transition:.2s;
  }
  .tl-dot.visited{
    border-color:var(--teal);
    color:#fff;
    background:var(--teal);
  }
  .tl-connector{
    flex:1;
    width:0;
    min-height:34px;
    border-left:2.5px solid var(--amber-line);
    margin:2px 0;
  }
  .tl-connector.flight{ border-left-style:dashed; }
  .tl-connector.visited{ border-left-color:var(--teal-line); }
  .tl-connector.fork{ border-left-style:dotted; border-left-color:#b9b6ac; min-height:14px; }

  .tl-fork{
    margin:0 0 22px 50px;
    display:flex;
    flex-direction:column;
    gap:9px;
  }
  .fork-caption{
    font-family:'JetBrains Mono', monospace;
    font-size:10.5px;
    letter-spacing:.04em;
    text-transform:uppercase;
    color:var(--text-dim);
    margin-bottom:2px;
  }
  .fork-option{
    border-radius:9px;
    padding:10px 13px;
    border:1px solid;
  }
  .fork-a{ background:var(--amber-soft); border-color:var(--amber-line); }
  .fork-b{ background:#eceaf9; border-color:#c4bdf0; }
  .fork-title{
    font-family:'Space Grotesk', sans-serif;
    font-weight:600;
    font-size:13px;
  }
  .fork-a .fork-title{ color:var(--amber); }
  .fork-b .fork-title{ color:#5a4bc4; }
  .fork-desc{
    font-size:12px;
    color:#514f49;
    margin-top:3px;
    line-height:1.4;
  }
  .fork-step{
    font-size:11.5px;
    color:#5a4bc4;
    margin-top:6px;
    padding-top:6px;
    border-top:1px dashed #c4bdf0;
  }

  .tl-content{
    flex:1;
    padding-bottom:26px;
    min-width:0;
  }
  .tl-row.active .tl-dot{ box-shadow:0 0 0 4px var(--amber-soft); }

  .tl-card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:13px 15px;
    margin-top:2px;
  }
  .tl-row.visited .tl-card{
    background:var(--teal-soft);
    border-color:var(--teal-line);
  }
  .tl-head{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:10px;
  }
  .tl-head > div:first-child{
    flex:1;
    min-width:0;
  }
  .tl-name{
    font-family:'Space Grotesk', sans-serif;
    font-weight:600;
    font-size:15px;
    line-height:1.25;
  }
  .tl-sub{
    font-size:12px;
    color:var(--text-dim);
    margin-top:1px;
  }
  .tl-date{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--text-dim);
    white-space:normal;
    text-align:right;
    max-width:38%;
    flex-shrink:0;
  }
  .tl-desc{
    font-size:13px;
    color:#44423d;
    line-height:1.45;
    margin-top:6px;
  }
  .tl-desc a, .fork-desc a, .fork-step a{
    color:var(--amber);
    font-weight:600;
    text-decoration:underline;
    text-underline-offset:2px;
  }
  .fork-b .fork-desc a, .fork-b .fork-step a{
    color:#5a4bc4;
  }
  .tl-weather{
    font-family:'JetBrains Mono', monospace;
    font-size:11.5px;
    color:var(--amber);
    background:var(--amber-soft);
    display:inline-block;
    padding:4px 9px;
    border-radius:6px;
    margin-top:8px;
  }
  .tl-note{
    width:100%;
    background:#fff;
    border:1px solid var(--line);
    border-radius:7px;
    color:var(--text);
    font-family:'Inter',sans-serif;
    font-size:12.5px;
    padding:7px 9px;
    resize:none;
    margin-top:9px;
  }
  .tl-note::placeholder{color:#a8a69f;}
  .tl-note:focus{outline:none; border-color:var(--amber);}

  .tl-actions{
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    margin-top:10px;
  }
  .mark-btn{
    font-family:'JetBrains Mono', monospace;
    font-size:11.5px;
    letter-spacing:.03em;
    text-transform:uppercase;
    border:1.5px solid var(--amber);
    background:#fff;
    color:var(--amber);
    padding:7px 13px;
    border-radius:7px;
    cursor:pointer;
    transition:.15s;
  }
  .mark-btn:active{ transform:scale(.97); }
  .tl-row.visited .mark-btn{
    border-color:var(--teal);
    color:var(--teal);
  }
  .visited-stamp{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--teal);
    font-weight:600;
  }

  footer{
    padding:14px 20px 26px;
    border-top:1px solid var(--line);
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
  }
  footer p{margin:0; font-size:11px; color:var(--text-dim); line-height:1.4;}
  .reset-btn{
    font-family:'JetBrains Mono', monospace;
    font-size:10.5px;
    letter-spacing:.04em;
    text-transform:uppercase;
    background:#fff;
    border:1px solid var(--line);
    color:var(--text-dim);
    padding:7px 12px;
    border-radius:7px;
    cursor:pointer;
    flex-shrink:0;
  }
  .reset-btn:active{border-color:var(--red); color:var(--red);}

  @media (min-width:480px){
    .tl-dot{width:38px;height:38px;}
    .tl-axis{width:38px;}
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div>
      <div class="eyebrow">Маршрутный лист</div>
      <h1>Южно-Сахалинск → КМВ → Москва</h1>
    </div>
    <div class="odometer">
      <div>
        <div class="odo-digits" id="odoDigits">0<span>/11</span></div>
        <div class="odo-label">пройдено</div>
      </div>
      <div class="odo-ticks" id="odoTicks"></div>
    </div>
  </header>

  <main id="timeline"></main>
</div>

<script>
const stops = [
  {
    id:1, name:'Южно-Сахалинск', sub:'Аэропорт · вылет',
    date:'16 июля, 16:00',
    desc:'Вылет рейсом SU 1747 в Москву (Шереметьево). В пути 8 ч 55 мин. Прилёт — 16:55.',
    visited:true, lat:46.9591, lon:142.7178, isoDate:'2026-07-16'
  },
  {
    id:2, name:'Москва (Шереметьево)', sub:'Пересадка',
    date:'16 июля, 16:55',
    desc:'Вылет рейсом SU 1314 в Минеральные Воды — 19:35. В пути 3 ч. Прилёт — 22:35.',
    visited:true, lat:55.9726, lon:37.4146, isoDate:'2026-07-16'
  },
  {
    id:3, name:'Минеральные Воды', sub:'Аэропорт · прилёт',
    date:'16 июля, 22:35',
    desc:'Прилёт в Минеральные Воды. Дальше — трансфер до Ессентуков.',
    visited:true, lat:44.2251, lon:43.0819, isoDate:'2026-07-16'
  },
  {
    id:4, name:'Ессентуки', sub:'ул. Шмидта, 96',
    date:'16 июля, ≈23:30',
    desc:'Заселение на ночь перед завтрашней регистрацией в ГИБДД.',
    visited:true, lat:44.0453, lon:42.8578, isoDate:'2026-07-16'
  },
  {
    id:5, name:'Ессентуки', sub:'ул. Баучидзе, 23',
    date:'17 июля, 9:00',
    desc:'ОГИБДД — регистрация ТС.',
    visited:false, lat:44.0470, lon:42.8610, isoDate:'2026-07-17'
  },
  {
    id:6, name:'Минеральные Воды', sub:'Погрузка на автовоз',
    date:'17–18 июля',
    desc:'Передача автомобиля перевозчику для доставки в Московскую область.',
    visited:false, lat:44.2019, lon:43.1367, isoDate:'2026-07-17'
  },
  {
    id:7, name:'Ессентуки', sub:'Прогулка по КМВ',
    date:'18–19 июля',
    desc:'Свободный день перед вылетом в Москву.',
    visited:false, lat:44.0453, lon:42.8578, isoDate:'2026-07-18'
  },
  {
    id:8, name:'Минеральные Воды', sub:'Аэропорт · вылет',
    date:'19 июля',
    desc:'Обратный вылет в Москву.',
    visited:false, lat:44.2251, lon:43.0819, isoDate:'2026-07-19'
  },
  {
    id:9, name:'Москва', sub:'Красный Строитель',
    date:'19 июля, после 18:00',
    desc:'Днём прилетаем из Минеральных Вод, вечером — заселение на Красном Строителе. Ждём автовоз с машиной из Минеральных Вод.',
    visited:false, lat:55.5980, lon:37.5910, isoDate:'2026-07-19'
  },
  {
    id:10, name:'Москва', sub:'п. Битца, Симферопольское шоссе, 3Б',
    date:'20–21 июля',
    desc:'От станции Битца — пешком до стоянки автовоза. <a href="https://2gis.ru/moscow/directions/tab/pedestrian/points/37.6115%2C55.5711%3B70030076195138573%7C37.6055%2C55.5706%3B4504222397628650" target="_blank" rel="noopener">маршрут в 2ГИС</a><br><br>Если автовоз приходит в первой половине дня и машину выдают до обеда — едем сразу на Люторецкий терминал. <a href="https://2gis.ru/moscow/directions/tab/car/points/37.6036%2C55.571%3B4504338361778898%7C37.5335%2C55.1113%3B70000001064667717" target="_blank" rel="noopener">маршрут в 2ГИС</a><br><br>Если ближе к вечеру — едем ночевать в Красный Строитель. <a href="https://2gis.ru/moscow/directions/points/37.605471%2C55.570555%3B4504222397628650%7C37.610743%2C55.586503%3B70030076344488950?m=37.614447%2C55.578297%2F14.91" target="_blank" rel="noopener">маршрут в 2ГИС</a><br><br>Утром следующего дня — на Люторецкий терминал. <a href="https://2gis.ru/moscow/directions/tab/car/points/37.6108%2C55.5865%3B70000001059390088%7C37.5335%2C55.1113%3B70000001064667717" target="_blank" rel="noopener">маршрут в 2ГИС</a>',
    visited:false, lat:55.5670, lon:37.5670, isoDate:'2026-07-20'
  },
  {
    id:11, name:'Люторецкий терминал', sub:'«Интермодал Логистикс Плюс»',
    date:'дата зависит от прибытия автовоза',
    desc:'Сдача автомобиля в терминал для контейнерной ж/д отправки на Сахалин.',
    visited:false, lat:55.5680, lon:37.5680, isoDate:null
  }
];

// connector AFTER stops[i] (true = flight/dashed, false = ground/solid, 'fork' = decision point, null = none)
const connectorAfter = [true, true, false, false, false, false, false, true, false, 'fork', null];

const NOTES_KEY = 'pajero-route-notes-v1';
function loadNotes(){
  try{ return JSON.parse(localStorage.getItem(NOTES_KEY)) || {}; }
  catch(e){ return {}; }
}
function saveNotes(n){ localStorage.setItem(NOTES_KEY, JSON.stringify(n)); }
let notes = loadNotes();

const timelineEl = document.getElementById('timeline');

function render(){
  timelineEl.innerHTML = '';
  stops.forEach((stop, i)=>{
    const visited = !!stop.visited;

    const row = document.createElement('div');
    row.className = 'tl-row' + (visited ? ' visited' : '');
    row.dataset.id = stop.id;

    const connType = connectorAfter[i];
    const connector = connType !== null
      ? `<div class="tl-connector ${connType === true ? 'flight' : ''} ${connType === 'fork' ? 'fork' : ''} ${visited ? 'visited' : ''}"></div>`
      : '';

    row.innerHTML = `
      <div class="tl-axis">
        <div class="tl-dot ${visited ? 'visited' : ''}">${stop.id}</div>
        ${connector}
      </div>
      <div class="tl-content">
        <div class="tl-card">
          <div class="tl-head">
            <div>
              <div class="tl-name">${stop.name}</div>
              <div class="tl-sub">${stop.sub}</div>
            </div>
            <div class="tl-date">${stop.date}</div>
          </div>
          <div class="tl-desc">${stop.desc}</div>
          ${stop.isoDate ? `<div class="tl-weather" id="wx-${stop.id}">🌡 загрузка прогноза…</div>` : ''}
          <textarea class="tl-note" rows="1" placeholder="Заметка на точке (необязательно)…">${notes[stop.id] || ''}</textarea>
          ${visited ? `<div class="tl-actions"><span class="visited-stamp">✓ пройдено</span></div>` : ''}
        </div>
      </div>
    `;

    row.querySelector('.tl-note').addEventListener('change', (e)=>{
      notes[stop.id] = e.target.value;
      saveNotes(notes);
    });

    timelineEl.appendChild(row);

    if(stop.id === 10){
      const fork = document.createElement('div');
      fork.className = 'tl-fork';
      fork.innerHTML = `
        <div class="fork-caption">Дальше — 2 варианта, смотря когда придёт автовоз</div>
        <div class="fork-option fork-a">
          <div class="fork-title">Вариант A · выдали до обеда</div>
          <div class="fork-desc">Едем сразу на Люторецкий терминал в тот же день. <a href="https://2gis.ru/moscow/directions/tab/car/points/37.6036%2C55.571%3B4504338361778898%7C37.5335%2C55.1113%3B70000001064667717" target="_blank" rel="noopener">маршрут в 2ГИС</a></div>
        </div>
        <div class="fork-option fork-b">
          <div class="fork-title">Вариант B · автовоз вечером</div>
          <div class="fork-desc">Едем ночевать в Красный Строитель. <a href="https://2gis.ru/moscow/directions/points/37.605471%2C55.570555%3B4504222397628650%7C37.610743%2C55.586503%3B70030076344488950?m=37.614447%2C55.578297%2F14.91" target="_blank" rel="noopener">маршрут в 2ГИС</a></div>
          <div class="fork-step">↓ утром следующего дня — на Люторецкий терминал. <a href="https://2gis.ru/moscow/directions/tab/car/points/37.6108%2C55.5865%3B70000001059390088%7C37.5335%2C55.1113%3B70000001064667717" target="_blank" rel="noopener">маршрут в 2ГИС</a></div>
        </div>
      `;
      timelineEl.appendChild(fork);
    }
  });
}

const odoTicks = document.getElementById('odoTicks');
stops.forEach(()=>{
  const t = document.createElement('div');
  t.className = 'odo-tick';
  odoTicks.appendChild(t);
});

function updateOdometer(){
  const visitedCount = stops.filter(s => s.visited).length;
  document.getElementById('odoDigits').innerHTML = `${visitedCount}<span>/${stops.length}</span>`;
  document.querySelectorAll('.odo-tick').forEach((t,i)=> t.classList.toggle('on', i < visitedCount));
}

render();
updateOdometer();
loadWeather();

function weatherEmoji(code){
  if(code === 0) return '☀️';
  if([1,2].includes(code)) return '🌤️';
  if(code === 3) return '☁️';
  if([45,48].includes(code)) return '🌫️';
  if([51,53,55,56,57].includes(code)) return '🌦️';
  if([61,63,65,66,67,80,81,82].includes(code)) return '🌧️';
  if([71,73,75,77,85,86].includes(code)) return '🌨️';
  if([95,96,99].includes(code)) return '⛈️';
  return '🌡️';
}

async function loadWeather(){
  const targets = stops.filter(s => s.isoDate);
  for(const stop of targets){
    const el = document.getElementById(`wx-${stop.id}`);
    if(!el) continue;
    try{
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${stop.lat}&longitude=${stop.lon}&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weathercode&timezone=auto&start_date=${stop.isoDate}&end_date=${stop.isoDate}`;
      const res = await fetch(url);
      if(!res.ok) throw new Error('bad response');
      const data = await res.json();
      const d = data.daily;
      if(!d || !d.temperature_2m_max || d.temperature_2m_max.length === 0) throw new Error('no data');
      const tMax = Math.round(d.temperature_2m_max[0]);
      const tMin = Math.round(d.temperature_2m_min[0]);
      const icon = weatherEmoji(d.weathercode ? d.weathercode[0] : null);
      el.innerHTML = `${icon} ${tMin}…${tMax}°C`;
    }catch(e){
      el.remove();
    }
  }
}
</script>
</body>
</html>
